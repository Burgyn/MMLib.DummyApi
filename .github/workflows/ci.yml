name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  integration-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Install TeaPie
        run: dotnet tool install -g TeaPie.Tool

      - name: Start API
        run: |
          ASPNETCORE_URLS=http://localhost:5229 dotnet run --project src/MMLib.DummyApi/MMLib.DummyApi.csproj --no-build -c Release &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5229/health > /dev/null; then
              echo "API is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "API failed to start"
              exit 1
            fi
            sleep 1
          done

      - name: Run TeaPie tests
        run: |
          mkdir -p test-results
          teapie test ./tests/teapie -r test-results/teapie-report.xml

      - name: Upload TeaPie report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: teapie-report
          path: test-results/
          retention-days: 7

  docker-publish:
    runs-on: ubuntu-latest
    needs: integration-test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/burgyn/mmlib-dummyapi
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build image for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: mmlib-dummyapi:smoke-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container with custom collection
        run: |
          docker run -d --name dummyapi-smoke \
            -p 8080:8080 \
            -v ${{ github.workspace }}/tests/docker/test-collections.json:/config/collections.json \
            -e DUMMYAPI__COLLECTIONSFILE=/config/collections.json \
            mmlib-dummyapi:smoke-test

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health > /dev/null; then
              echo "API is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "API failed to start"
              docker logs dummyapi-smoke
              exit 1
            fi
            sleep 1
          done

      - name: Verify custom collection
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/books)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: GET /books returned $STATUS, expected 200"
            exit 1
          fi

          COUNT=$(curl -s http://localhost:8080/books | jq length)
          if [ "$COUNT" -lt 1 ]; then
            echo "FAIL: Expected seeded books, got $COUNT items"
            exit 1
          fi
          echo "PASS: GET /books returned $COUNT items"

      - name: Cleanup smoke test
        if: always()
        run: |
          docker logs dummyapi-smoke || true
          docker rm -f dummyapi-smoke || true

      - name: Build and push
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
